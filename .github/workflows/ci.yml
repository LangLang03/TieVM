name: tievm-ci

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  clang-primary:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: xmake-io/github-action-setup-xmake@v1
      - name: Configure
        run: xmake f -y -m release --toolchain=clang
      - name: Build
        run: xmake build -y -vD
      - name: Unit + Smoke
        run: xmake run tievm_tests
      - name: Smoke Only
        run: xmake run tievm_tests --gtest_filter=Smoke.*

  gcc-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: xmake-io/github-action-setup-xmake@v1
      - name: Configure GCC
        run: xmake f -y -m release --toolchain=gcc
      - name: Build GCC
        run: xmake build -y -vD
      - name: Test GCC
        run: xmake run tievm_tests

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: xmake-io/github-action-setup-xmake@v1

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Configure for compile database
        run: xmake f -y -m debug --toolchain=clang

      - name: Generate compile_commands.json
        run: xmake project -k compile_commands

      - name: Run clang-tidy (changed files only)
        if: github.event_name == 'pull_request'
        run: |
          git diff --name-only --diff-filter=AM origin/${{ github.base_ref }}...HEAD -- 'src/**/*.cpp' 'tests/**/*.cpp' > changed_files.txt || true
          if [ -s changed_files.txt ]; then
            echo "Checking changed files:"
            cat changed_files.txt
            xargs -a changed_files.txt clang-tidy -p .
          else
            echo "No C++ files changed."
          fi

      - name: Run clang-tidy (all files)
        if: github.event_name == 'push'
        run: |
          find src tests -name '*.cpp' -type f -print0 | xargs -0 clang-tidy -p .