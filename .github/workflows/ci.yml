name: tievm-ci

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  clang-primary:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup xmake
        id: setup_xmake
        uses: xmake-io/github-action-setup-xmake@v1
        continue-on-error: ${{ runner.os == 'Windows' }}
      - name: Fallback setup xmake on Windows
        if: runner.os == 'Windows' && steps.setup_xmake.outcome == 'failure'
        shell: pwsh
        run: |
          choco install xmake -y --no-progress
      - name: Check xmake version
        run: xmake --version
      - name: Configure
        run: xmake f -y -m release --toolchain=clang
      - name: Build
        run: xmake build -y -vD
      - name: Unit + Smoke
        run: xmake run tievm_tests
      - name: Smoke Only
        run: xmake run tievm_tests --gtest_filter=Smoke.*

  gcc-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: xmake-io/github-action-setup-xmake@v1
      - name: Configure GCC
        run: xmake f -y -m release --toolchain=gcc
      - name: Build GCC
        run: xmake build -y -vD
      - name: Test GCC
        run: xmake run tievm_tests

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: xmake-io/github-action-setup-xmake@v1

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Configure for compile database
        run: xmake f -y -m debug --toolchain=clang

      - name: Generate compile_commands.json
        run: xmake project -k compile_commands

      - name: Run clang-tidy (changed files)
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="origin/${{ github.base_ref }}...HEAD"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              RANGE="HEAD~1...HEAD"
            else
              RANGE="$BEFORE_SHA...${{ github.sha }}"
            fi
          fi

          git diff --name-only --diff-filter=AM "$RANGE" \
            | grep -E '^(src|tests)/.*\.cpp$' > changed_files.txt || true

          if [ -s changed_files.txt ]; then
            echo "Checking changed files:"
            cat changed_files.txt
            xargs -a changed_files.txt clang-tidy -p . -quiet \
              -header-filter='^(src|tests)/' \
              -checks='-*,bugprone-*,clang-analyzer-*,performance-*,-bugprone-easily-swappable-parameters'
          else
            echo "No C++ files changed."
          fi
